[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "import-janitor"
version = "0.1.0"
description = "Best-effort Python import fixer — detects cycles, fixes imports, enforces best practices"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "MihaiStreames", email = "72852703+MihaiStreames@users.noreply.github.com" },
]
keywords = [
    "imports",
    "circular-imports",
    "static-analysis",
    "ast",
    "refactoring",
    "linter",
    "formatter",
    "python",
    "cli",
    "developer-tools",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Utilities",
    "Typing :: Typed",
]
dependencies = [
    "janitor-core>=0.1.0",
    "typer>=0.24.1",
    "rich>=14.3.3",
]

[project.optional-dependencies]
unstable = [
    "janitor-core[unstable]",
]
dev = [
    "pytest>=9.0.2",
    "pytest-snapshot>=0.9.0",
    "mypy>=1.19.1",
    "ruff>=0.15.5",
]

[project.scripts]
janitor = "janitor_cli.cli:app"

[project.urls]
Homepage = "https://github.com/MihaiStreames/import-janitor"
Repository = "https://github.com/MihaiStreames/import-janitor"
Issues = "https://github.com/MihaiStreames/import-janitor/issues"
Changelog = "https://github.com/MihaiStreames/import-janitor/blob/main/CHANGELOG.md"

[tool.uv.sources]
janitor-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/janitor_cli"]

[tool.hatch.build.targets.sdist]
include = ["src/janitor_cli/**", "README.md", "LICENSE"]